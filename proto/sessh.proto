syntax = "proto3";

package sessh.protocol.v1;

// Versioned remote protocol payloads.
//
// The stable handshake payloads live in sessh_handshake.proto. After both
// sides accept the handshake, this file's messages are governed by
// protocol_major/protocol_minor: a major protocol version bump permits
// incompatible frame-format or message-schema changes, including reusing field
// numbers with new names or semantics. Minor versions are for changes that are
// intended to preserve forward and/or backward compatibility: if the peer
// reports a higher minor version for the same major version, the peer is
// responsible for remaining compatible with this side; if the peer reports a
// lower minor version, this side decides whether it can proceed.
//
// Remote frame type ids. These are the numeric values stored in the fixed
// frame header. Values are grouped by broad role rather than packed densely:
// 0x0001-0x000f are reserved for stable connection setup/diagnostic frames
// defined in sessh_handshake.proto, 0x0010-0x001f are client-to-remote request
// frames, and 0x0020-0x002f are remote-to-client response/stream frames. Gaps
// are reserved for related future frames, so the enum is intentionally
// non-contiguous.
enum FrameType {
  FRAME_TYPE_UNSPECIFIED = 0;

  reserved 1 to 15;

  // Client-to-remote request frames.

  // Payload: CommandRequest.
  FRAME_TYPE_COMMAND_REQUEST = 0x0010;
  // Payload: SessionNew.
  FRAME_TYPE_SESSION_NEW = 0x0011;
  // Payload: SessionAttach.
  FRAME_TYPE_SESSION_ATTACH = 0x0012;
  // Payload: Input.
  FRAME_TYPE_INPUT = 0x0015;
  // Payload: Resize.
  FRAME_TYPE_RESIZE = 0x0016;
  // Payload: Repaint.
  FRAME_TYPE_REPAINT = 0x0017;
  // Payload: PingRequest.
  FRAME_TYPE_PING_REQUEST = 0x0018;

  // Remote-to-client response and stream frames.

  // Payload: CommandResponse.
  FRAME_TYPE_COMMAND_RESPONSE = 0x0020;
  // Payload: SessionAttached.
  FRAME_TYPE_SESSION_ATTACHED = 0x0021;
  // Payload: SessionEnded.
  FRAME_TYPE_SESSION_ENDED = 0x0022;
  // Payload: Draw.
  FRAME_TYPE_DRAW = 0x0027;
  // Payload: PingResponse.
  FRAME_TYPE_PING_RESPONSE = 0x0028;
}

// Framed payload, client -> session agent.
//
// Runs a management command that does not attach to a session.
message CommandRequest {
  // Supported commands are ["list"], ["kill", ID], and ["kill-all"].
  repeated string argv = 1;
}

// Embedded in SessionNew.
//
// Environment value used when creating a new session.
message EnvironmentEntry {
  string name = 1;
  string value = 2;
}

// Embedded in SessionNew.
//
// Outer terminal default colors reported by the client.
message DefaultColors {
  // 0xffffffff means unknown/default; 0x01RRGGBB means explicit RGB.
  uint32 foreground_color = 1;
  // 0xffffffff means unknown/default; 0x01RRGGBB means explicit RGB.
  uint32 background_color = 2;
}

// Framed payload, client -> session agent.
//
// Creates a new interactive PTY session.
//
// The client must send Resize before SessionNew. A successful SessionNew is
// followed by SessionAttached for the new session, then Draw messages.
message SessionNew {
  // Maximum session-agent-retained scrollback rows for this session.
  uint32 scrollback_row_limit = 1;
  // Session environment entries. Currently SHELL is the only used key.
  repeated EnvironmentEntry environment = 2;
  // Colors the session agent may use to answer early OSC 10/11 queries.
  DefaultColors query_default_colors = 3;
}

// Embedded in SessionAttach.
//
// Client reconnect cursor into session-agent-retained scrollback.
message ScrollbackCursor {
  // Retained-scrollback generation known by the client.
  uint64 scrollback_epoch = 1;
  // Number of rows from that generation already materialized locally.
  uint64 seen_scrollback_rows = 2;
}

// Framed payload, client -> session agent.
//
// Attaches to an existing session.
//
// The client must send Resize before SessionAttach. A successful SessionAttach
// is followed by SessionAttached for the selected session, then Draw messages.
message SessionAttach {
  // If absent, attach to the most recently detached attachable session.
  optional string session_id = 1;
  // Initial retained scrollback row count. Absent means all retained rows.
  optional uint32 initial_scrollback_row_count = 2;
  // Present only for automatic reconnect.
  optional ScrollbackCursor reconnect_cursor = 3;
}

// Framed payload, client -> session agent.
//
// Local terminal input bytes.
message Input {
  // Raw bytes read from the local terminal.
  bytes data = 1;
}

// Framed payload, client -> session agent.
//
// Current terminal size for this attachment.
message Resize {
  // Rows visible in the local terminal. The session agent bounds this to u16.
  uint32 terminal_rows = 1;
  // Columns visible in the local terminal. The session agent bounds this to u16.
  uint32 terminal_cols = 2;
}

// Framed payload, client -> session agent.
//
// Requests that the session agent redraw terminal state for this attachment.
message Repaint {
  // True means clear local retained scrollback and redraw session-agent-retained
  // scrollback before the visible screen. False means redraw only the visible
  // screen in place.
  bool include_scrollback = 1;
}

// Framed payload, client -> session agent.
//
// Requests a transport responsiveness acknowledgement. This measures the framed
// path through ssh/broker/session-agent, not application output or UI rendering.
message PingRequest {
}

// Framed payload, session agent -> client.
//
// Process-like response for a CommandRequest.
message CommandResponse {
  // Exit status for the management command. The client bounds this to u8.
  uint32 exit_status = 1;
  bytes stdout = 2;
  bytes stderr = 3;
}

// Framed payload, session agent -> client.
//
// Confirms the session selected for this connection.
//
// The session agent sends this after either SessionNew or SessionAttach succeeds. From
// this point on, the remote connection is bound to the returned session_id.
message SessionAttached {
  string session_id = 1;
}

// Framed payload, session agent -> client.
//
// Tells an attached client that the session has ended.
message SessionEnded {
  // 0: process exited itself; 1: killed by client command; 2: session agent shutdown.
  uint32 reason = 1;
  // 0: no status; 1: exited with status; 2: terminated by signal.
  uint32 exit_kind = 2;
  // Exit status or signal number, ignored when exit_kind is 0.
  sint32 status = 3;
  // End timestamp in Unix milliseconds, or 0 when not applicable.
  uint64 ended_at_unix_ms = 4;
}

// Framed payload, session agent -> client.
//
// Session-agent-generated terminal bytes for the attached session.
message Draw {
  // Retained-scrollback generation after this draw.
  uint64 scrollback_epoch = 1;
  // Session-agent-retained scrollback rows newly materialized or represented by this
  // draw. This is a reconnect cursor, not a physical terminal-scroll count.
  uint64 scroll_count = 2;
  // Modeled inner cursor row after this draw. The client uses this for
  // reconnect UI placement; it must not parse bytes or maintain a cell grid.
  uint32 cursor_row = 3;
  // Self-contained terminal bytes to write to the outer terminal in protocol
  // order. A Draw must apply and clean up any temporary terminal state it uses.
  bytes draw_bytes = 4;
  // Present on live output when this draw reflects input frames from this
  // attachment up to and including this client frame seq number. This is
  // payload-level request coverage; the frame header seq only identifies the
  // Draw frame itself.
  optional uint64 request_seq_number = 5;
  // Terminal bytes the client keeps in memory and writes only when this relay
  // ends by detach or session-end. Present empty clears a previous restore.
  // This lets alternate-screen sessions restore the modeled primary screen on
  // detach without applying that cleanup during reconnect.
  optional bytes relay_end_restore_bytes = 6;
}

// Framed payload, session agent -> client.
//
// Acknowledges a PingRequest.
message PingResponse {
  // Frame seq number of the PingRequest being acknowledged.
  uint64 request_seq_number = 1;
}
