syntax = "proto3";

package sessh.protocol.v1;

import "sessh_handshake.proto";

// Versioned remote protocol payloads.
//
// The stable handshake payloads live in sessh_handshake.proto. After both
// sides accept the handshake, this file's messages are governed by
// protocol_major/protocol_minor: a major protocol version bump permits
// incompatible frame-format or message-schema changes, including reusing field
// numbers with new names or semantics. Minor versions are for changes that are
// intended to preserve forward and/or backward compatibility: if the peer
// reports a higher minor version for the same major version, the peer is
// responsible for remaining compatible with this side; if the peer reports a
// lower minor version, this side decides whether it can proceed.
//
message Frame {
  reserved 1 to 9;

  oneof payload {
    sessh.handshake.v1.Error error = 10;
    SessionCreate session_create = 11;
    SessionAttach session_attach = 12;
    Input input = 13;
    Resize resize = 14;
    RepaintRequest repaint_request = 15;
    PingRequest ping_request = 16;
    SessionCreated session_created = 17;
    SessionAttached session_attached = 18;
    SessionEnded session_ended = 19;
    Draw draw = 20;
    PingResponse ping_response = 21;
    RepaintResponse repaint_response = 22;
    TtyTranscriptChunk tty_transcript_chunk = 23;
  }
}

// Embedded in SessionCreate.
//
// Initial terminal size used when creating a new PTY session.
message TerminalSize {
  // Rows visible in the terminal. The session agent bounds this to u16.
  uint32 terminal_rows = 1;
  // Columns visible in the terminal. The session agent bounds this to u16.
  uint32 terminal_cols = 2;
}

// Embedded in SessionCreate.
//
// Environment value used when creating a new session.
message EnvironmentEntry {
  string name = 1;
  string value = 2;
}

// Embedded in SessionCreate.
//
// Outer terminal default colors reported by the client.
message DefaultColors {
  // 0xffffffff means unknown/default; 0x01RRGGBB means explicit RGB.
  uint32 foreground_color = 1;
  // 0xffffffff means unknown/default; 0x01RRGGBB means explicit RGB.
  uint32 background_color = 2;
}

// Framed payload, client -> session agent.
//
// Creates a new interactive PTY session without attaching this client. A
// successful SessionCreate is followed by SessionCreated. The client may then
// attach using SessionAttach on the same connection, or close the connection
// and leave the session detached.
message SessionCreate {
  // Initial PTY size.
  TerminalSize terminal_size = 1;
  // Maximum session-agent-retained scrollback rows for this session.
  uint32 scrollback_row_limit = 2;
  // Session environment entries. Currently SHELL is the only used key.
  repeated EnvironmentEntry environment = 3;
  // Colors the session agent may use to answer early OSC 10/11 queries.
  DefaultColors query_default_colors = 4;
  // Canonical session GUID in normal hyphenated UUID form.
  string session_guid = 5;
  // Alias to register for this session in the session agent's namespace. Empty
  // asks the receiver to generate a remote alias.
  string session_alias = 6;
  // Optional argv to exec inside the PTY. Empty starts the user's interactive
  // login shell.
  repeated string command_argv = 7;
}

// Framed payload, client -> session agent.
//
// Attaches to an existing session. A successful SessionAttach is followed by
// SessionAttached for the selected session, then Draw/RepaintResponse messages.
message SessionAttach {
  Resize resize = 1;
  // Session GUID or alias. Empty means attach the most recent session known to
  // the selected broker.
  string session_ref = 2;
  // When true, the session agent sends raw inner PTY transcript chunks for
  // this attachment. The client still owns archive creation and storage.
  bool capture_tty_transcript = 3;
}

// Framed payload, client -> session agent.
//
// Local terminal input bytes.
message Input {
  // Raw bytes read from the local terminal.
  bytes data = 1;
}

// Framed payload, client -> session agent.
//
// Current terminal size for this attachment.
message Resize {
  // Rows visible in the local terminal. The session agent bounds this to u16.
  uint32 terminal_rows = 1;
  // Columns visible in the local terminal. The session agent bounds this to u16.
  uint32 terminal_cols = 2;
  // Present for resize frames after attach and for embedded SessionAttach
  // resizes. The session agent applies the new size, then answers this request
  // with a RepaintResponse.
  optional RepaintRequest repaint_request = 3;
  // Rows between the outer terminal viewport top and the sessh viewport top.
  // Omitted means the viewports are aligned. -1 means the client no longer
  // knows the offset, typically after SIGWINCH resized an unaligned viewport;
  // the session agent must align the viewports in its repaint response.
  optional sint32 viewport_offset = 4;
}

// Framed payload, client -> session agent.
//
// Requests that the session agent redraw terminal state for this attachment.
message RepaintRequest {
  // Client-local repaint request sequence copied into RepaintResponse. While
  // this repaint is outstanding, the client ignores framed Draw messages and
  // resumes applying draws only after receiving the matching RepaintResponse.
  // If multiple RepaintRequests are in flight, the session agent may ignore all
  // but the last one.
  uint64 repaint_request_seq = 1;
  // Opaque scrollback cursor. Absent means assume the client has current
  // scrollback and send none. Present empty bytes means send all retained
  // scrollback available; present non-empty bytes must come from a previous
  // Draw.scrollback_cursor.
  optional bytes scrollback_cursor = 2;
  // Optional cap for retained scrollback rows included with an initial attach
  // repaint. Absent means all available retained scrollback.
  optional uint32 initial_scrollback_rows = 3;
}

// Framed payload, client -> session agent.
//
// Requests a transport responsiveness acknowledgement. This measures the framed
// path through ssh/broker/session-agent, not application output or UI rendering.
message PingRequest {
  uint64 ping_request_seq = 1;
}

// Framed payload, session agent -> client.
//
// Confirms that a SessionCreate created the requested session.
message SessionCreated {
  // Canonical session GUID in normal hyphenated UUID form.
  string session_guid = 1;
  // Alias registered for this session in the creating namespace.
  string session_alias = 2;
}

// Framed payload, session agent -> client.
//
// Confirms the session selected for this connection.
message SessionAttached {
  // Canonical session GUID in normal hyphenated UUID form.
  string session_guid = 1;
  // Primary alias for this session in the attaching namespace, if known.
  string session_alias = 2;
}

enum SessionEndReason {
  SESSION_END_REASON_UNSPECIFIED = 0;
  SESSION_END_REASON_PROCESS_EXITED = 1;
  SESSION_END_REASON_KILLED_BY_REQUEST = 2;
  SESSION_END_REASON_AGENT_SHUTDOWN = 3;
}

enum ExitStatusKind {
  EXIT_STATUS_KIND_UNSPECIFIED = 0;
  EXIT_STATUS_KIND_EXITED = 1;
  EXIT_STATUS_KIND_SIGNALLED = 2;
}

message ExitStatus {
  ExitStatusKind kind = 1;
  // Process exit status when kind is EXITED, or signal number when kind is
  // SIGNALLED.
  sint32 status = 2;
}

// Framed payload, session agent -> client.
//
// Tells an attached client that the session has ended.
message SessionEnded {
  SessionEndReason reason = 1;
  // Absent means the session agent did not observe a wait status, for example
  // because it is shutting down and synthesized the end notification.
  optional ExitStatus exit_status = 2;
  optional uint64 ended_at_unix_ms = 3;
}

// Framed payload, session agent -> client.
//
// Session-agent-generated terminal bytes for the attached session.
message Draw {
  // Opaque cursor representing the client scrollback state after applying this
  // draw. Clients must store and pass this back without interpreting it.
  bytes scrollback_cursor = 1;
  // Rows between the outer terminal viewport top and the sessh viewport top
  // after applying this draw. Omitted means the viewports are aligned.
  optional sint32 viewport_offset = 2;
  // Self-contained terminal bytes to write to the outer terminal in protocol
  // order. A Draw must apply and clean up any temporary terminal state it uses.
  bytes draw_bytes = 3;
  // Terminal bytes the client keeps in memory and writes only when this relay
  // ends by detach or session-end. Present empty clears a previous restore.
  // This lets alternate-screen sessions restore the modeled primary screen on
  // detach without applying that cleanup during reconnect.
  optional bytes relay_end_restore_bytes = 4;
}

// Framed payload, session agent -> client.
//
// Response for a RepaintRequest. The embedded Draw is applied exactly like a
// framed Draw.
message RepaintResponse {
  uint64 repaint_request_seq = 1;
  Draw draw = 2;
}

// Framed payload, session agent -> client.
//
// Acknowledges a PingRequest.
message PingResponse {
  uint64 ping_request_seq = 1;
}

enum TtyTranscriptStream {
  TTY_TRANSCRIPT_STREAM_UNSPECIFIED = 0;
  TTY_TRANSCRIPT_STREAM_INNER_IN = 1;
  TTY_TRANSCRIPT_STREAM_INNER_OUT = 2;
}

// Framed payload, session agent -> client.
//
// Raw inner PTY bytes captured for a client-requested tty transcript.
message TtyTranscriptChunk {
  TtyTranscriptStream stream = 1;
  bytes data = 2;
}
