syntax = "proto3";

package sessh.protocol.v1;

import "sessh_handshake.proto";

// Versioned sessh protocol payloads.
//
// The stable handshake payloads live in sessh_handshake.proto. After both
// sides accept the handshake, this file's messages are governed by
// protocol_major/protocol_minor: a major protocol version bump permits
// incompatible frame-format or message-schema changes, including reusing field
// numbers with new names or semantics. HelloRequest reports the maximum
// protocol version a peer can speak. If a newer peer accepts an older peer, the
// newer peer must speak the older peer's protocol for that connection; otherwise
// it must reject the handshake. Each side rejects peers whose maximum protocol
// is older than the oldest protocol it still supports.
//
message Frame {
  reserved 1 to 9;

  oneof payload {
    sessh.handshake.v1.Error error = 10;

    // Local client <-> local daemon API traffic. These frames are never
    // forwarded to the remote daemon.
    ClientDaemonItem client_daemon = 20;
    // Logical visible-client <-> remote endpoint traffic. Local client sockets
    // can carry these directly; daemon-to-daemon tunnels carry them inside mux
    // payloads.
    ClientRemoteItem client_remote = 21;
    // Local daemon <-> remote daemon tunnel traffic.
    DaemonTunnelItem daemon_tunnel = 22;
  }
}

// Generic environment name/value pair. The enclosing message defines where the
// entry is applied.
message EnvironmentEntry {
  string name = 1;
  string value = 2;
}

// Semantic connection-state transition shared by terminal-emulator sessions,
// proxy streams, and local daemon transport setup. This is not remote process
// output. Visible clients decide how, where, and whether to render it.
message ConnectionEvent {
  message SshConnecting {
  }

  // The child ssh transport is connected and running its remote command. The
  // remote sesshd may still need to be bootstrapped or handshaken.
  message SshConnected {
  }

  // Raw bytes written by the child ssh transport to stderr. This is still a
  // connection event, not remote process stderr: remote process stderr is
  // carried by the SSH channel itself.
  message SshStderr {
    bytes data = 1;
  }

  message BootstrapStarted {
  }

  message BootstrapFinished {
  }

  message DaemonConnecting {
  }

  // Remote sesshd is handshaken; stream payload can flow.
  message DaemonConnected {
  }

  // The daemon-to-daemon tunnel dropped after it had been established. This
  // usually means the child ssh transport died or the network path broke. It
  // does not prove the remote sesshd process exited.
  message DaemonDisconnected {
    // Deadline on the sender machine's sessh local-boot-time clock, in
    // milliseconds. The sessh local-boot-time clock is a suspend-inclusive
    // monotonic boot clock: Linux CLOCK_BOOTTIME, Darwin CLOCK_UPTIME_RAW, and
    // CLOCK_MONOTONIC elsewhere when no stronger boot-time clock is available.
    // This field is only meaningful for same-machine client/daemon/control IPC;
    // do not forward it across machines or compare it with wall time.
    optional uint64 retry_at_local_boot_time_ms = 1;
  }

  message Unresponsive {
    // Same clock and same-machine restriction as Disconnected.
    optional uint64 retry_at_local_boot_time_ms = 1;
  }

  oneof event {
    SshConnecting ssh_connecting = 1;
    SshConnected ssh_connected = 2;
    SshStderr ssh_stderr = 3;
    BootstrapStarted bootstrap_started = 4;
    BootstrapFinished bootstrap_finished = 5;
    DaemonConnecting daemon_connecting = 6;
    DaemonConnected daemon_connected = 7;
    DaemonDisconnected daemon_disconnected = 8;
    Unresponsive unresponsive = 9;
  }
}

message ClientDaemonItem {
  // Local visible-client -> local daemon request to acquire an SSH-backed
  // transport to a remote sesshd. The client may immediately pipeline stream
  // frames after this request; the local daemon queues them behind tunnel setup
  // and forwards them over ssh when the remote daemon endpoint is ready.
  message SshTransportAcquire {
    repeated string ssh_option = 1;
    string host = 2;
    bool bootstrap = 3;
    // SSH_AUTH_SOCK to expose to the child ssh process when creating a new
    // transport. This is not part of pooled-transport identity; a reused
    // transport keeps the agent environment it was created with.
    optional string ssh_auth_sock = 4;
    // Effective resolved IPQoS value for the transport. Unlike ssh_option, this
    // is part of pooled-transport identity because sessh cannot retag the child
    // ssh process' TCP socket after creation.
    string ip_qos = 5;
  }

  // Local client -> local daemon request to follow new operational log entries.
  message DaemonLogRequest {
  }

  // One human-facing daemon log entry. The message is intentionally not overly
  // structured yet; the daemon log is for operator diagnosis, not stable API
  // consumption.
  message DaemonLogEntry {
    int64 unix_ms = 1;
    string message = 2;
  }

  // Visible client request for the reconnect owner to retry immediately. The
  // visible client decides when to intercept CTRL-R and translate it to this
  // command; CTRL-R interception policy is not part of the protocol.
  message RetryNow {
  }

  oneof payload {
    SshTransportAcquire ssh_transport_acquire = 1;
    DaemonLogRequest log_request = 10;
    DaemonLogEntry log_entry = 11;
    ConnectionEvent connection_event = 12;
    RetryNow retry_now = 13;
  }
}

message ClientRemoteItem {
  oneof payload {
    TerminalEmulatorItem terminal_emulator = 1;
    ProxyStreamItem proxy = 2;
  }
}

message DaemonTunnelItem {
  // Transport control frame used to check whether the peer is still responsive.
  // Ping/Pong live outside all logical streams, so handling them must not
  // advance stream offsets or mutate terminal contents.
  message Ping {
  }

  // Response to Ping.
  message Pong {
  }

  // Framed payload, client daemon <-> server daemon.
  //
  // This is the only multiplexing envelope. All stream identity lives here; the
  // payload items inside remain usable on non-muxed local IPC sockets.
  message MuxStreamFrame {
    uint64 stream_id = 1;

    // Opens or resumes a mux stream. Stream-specific open details are carried
    // as typed stream payloads, not in the mux envelope, so this layer only
    // tracks resume and backpressure state.
    message Open {
      // First outbound unit this side still needs from the peer. The typed
      // stream item defines whether this is a byte offset or an ordered item
      // offset.
      uint64 recv_next_offset = 1;
      // Backpressure credit this side grants the peer. The peer may send units
      // in [recv_next_offset, recv_next_offset + receive_window_bytes) for this
      // mux stream and must stop when that window is exhausted.
      uint32 receive_window_bytes = 2;
    }

    // Accepts a mux stream open and reports the acceptor's receive state. This
    // is not a required round-trip barrier; peers may pipeline payload after
    // open when they already have credit.
    message OpenOk {
      uint64 recv_next_offset = 1;
      // Initial backpressure credit granted by the stream acceptor. This has
      // the same meaning as Open.receive_window_bytes.
      uint32 receive_window_bytes = 2;
    }

    // Ordered durable stream payload carried over a mux stream. The typed item
    // defines the offset semantics: terminal-emulator streams count ordered
    // items, while proxy stream data uses byte offsets and treats Open as setup
    // that does not consume byte-offset space.
    message Payload {
      uint64 offset = 1;

      oneof item {
        TerminalEmulatorItem terminal_emulator = 2;
        ProxyStreamItem proxy = 3;
      }
    }

    message Ack {
      // First byte offset not yet received from the peer.
      uint64 recv_next_offset = 1;
      // Updated backpressure credit. Receivers increase this as they drain
      // their bounded per-stream buffer; senders stop sending on this mux
      // stream when the advertised window is exhausted. Other mux streams have
      // independent windows and may continue making progress.
      uint32 receive_window_bytes = 2;
    }

    // Graceful end of this peer's outbound direction for the mux stream. The
    // final offset is the first byte offset after the last payload item, so EOF
    // can be acknowledged and replayed idempotently after reconnect.
    message Eof {
      uint64 final_offset = 1;
    }

    // Abrupt mux-stream termination, analogous to TCP RST or HTTP/2 RST_STREAM.
    // Graceful terminal session exit is sent as a stream payload before Eof.
    message Reset {
      string code = 1;
      string message = 2;
      optional string hint = 3;
    }

    oneof message {
      Open open = 2;
      OpenOk open_ok = 3;
      Payload payload = 4;
      Ack ack = 5;
      Eof eof = 6;
      Reset reset = 7;
    }
  }

  oneof payload {
    Ping ping = 1;
    Pong pong = 2;
    MuxStreamFrame mux_stream = 10;
  }
}

// Ordered terminal-emulator stream item. Direct local IPC can carry this as a
// top-level Frame payload; mux tunnels carry it inside MuxStreamFrame.Payload.
message TerminalEmulatorItem {
  // Terminal-emulator stream open details.
  message Open {
    // Durable session GUID.
    string session_guid = 1;
    // Initial terminal size and repaint request for this client view.
    Resize resize = 2;
    // When true, the remote session runtime sends raw inner PTY transcript
    // chunks for this client view. The client still owns archive creation and
    // storage.
    bool capture_tty_transcript = 3;
    // Present for a new terminal-emulator stream. Absent means resume the
    // existing stream identified by session_guid.
    SessionCreate create = 4;
  }

  // Creates a new interactive PTY session for this terminal-emulator stream.
  message SessionCreate {
  // Portable PTY settings captured from the client-side tty before sessh puts it
  // into raw mode. This follows SSH's pty-req model: do not send a native
  // termios struct, because those layouts and flag values are OS-specific.
    message TtySettings {
      message Mode {
        // SSH terminal-mode opcode. Opcodes 1-159 have uint32 values; 128/129
        // are input/output baud rates.
        uint32 opcode = 1;
        uint32 value = 2;
      }

      // TERM value from the client environment. This is only present when the
      // remote PTY exposes the client's real terminal, such as
      // no-terminal-emulator mode.
      // Normal sessh sessions leave this absent so the remote advertises
      // sessh's terminal-emulator TERM instead. Empty is meaningful when the
      // client had TERM set to an empty string.
      optional string term = 1;
      // SSH/RFC 4254 terminal-mode opcode/value pairs. Unknown opcodes are
      // ignored by the receiver, matching SSH server behavior.
      repeated Mode tty_mode = 2;
    }

    // Outer terminal default colors reported by the client.
    message DefaultColors {
      // 0xffffffff means unknown/default; 0x01RRGGBB means explicit RGB.
      uint32 foreground_color = 1;
      // 0xffffffff means unknown/default; 0x01RRGGBB means explicit RGB.
      uint32 background_color = 2;
    }

    // Execs a program directly, preserving argv boundaries. Empty argv is
    // treated the same as no command.
    message ExecCommand {
      repeated string argv = 1;
    }

    // Evaluates a command string with the remote account's shell. An empty
    // command is still a command; clients that want an interactive login shell
    // must leave SessionCreate.command unset.
    message ShellCommand {
      string command = 1;
    }

    // Maximum runtime-retained scrollback rows for this session.
    uint32 scrollback_row_limit = 2;
    // Environment entries to apply to the PTY child. Entries already present in
    // the request take precedence over environment inherited by the remote
    // broker/daemon.
    repeated EnvironmentEntry environment = 3;
    // Colors the remote session runtime may use to answer early OSC 10/11
    // queries.
    DefaultColors query_default_colors = 4;
    // At most one command form may be present. When command is unset, the
    // runtime starts the user's interactive login shell. The shell_command
    // variant mirrors ssh's `ssh HOST cmd args...` behavior after the local argv
    // has been joined into a command string for the remote shell.
    oneof command {
      ExecCommand exec_command = 8;
      ShellCommand shell_command = 9;
    }
    // Portable local tty settings to apply to the newly created remote PTY.
    TtySettings tty_settings = 10;
    // Maximum time the session may remain disconnected before the runtime ends
    // it. Zero means disabled.
    uint64 reap_ms = 11;
  }

  // Local terminal input bytes.
  message Input {
    // Raw bytes read from the local terminal.
    bytes data = 1;
    // Client-assigned input sequence. The remote session runtime acknowledges
    // nonzero sequence numbers after receiving the input frame.
    uint64 input_seq = 2;
  }

  // Confirms that the remote session runtime received an Input frame.
  message InputAck {
    uint64 input_seq = 1;
  }

  // Current terminal size for this attached client.
  message Resize {
    // Rows visible in the local terminal. The remote session runtime bounds
    // this to u16.
    uint32 terminal_rows = 1;
    // Columns visible in the local terminal. The remote session runtime bounds
    // this to u16.
    uint32 terminal_cols = 2;
    // Present for resize frames that need a redraw. The remote session runtime
    // applies the new size, then answers this request with a RepaintResponse.
    optional RepaintRequest repaint_request = 3;
    // Rows between the outer terminal viewport top and the sessh viewport top.
    // Omitted means the viewports are aligned. -1 means the client no longer
    // knows the offset, typically after SIGWINCH resized an unaligned viewport;
    // the remote session runtime must align the viewports in its repaint
    // response.
    optional sint32 viewport_offset = 4;
  }

  // Requests that the remote session runtime redraw terminal state for this
  // attached client.
  message RepaintRequest {
    // Client-local repaint request sequence copied into RepaintResponse. While
    // this repaint is outstanding, the client ignores framed Draw messages and
    // resumes applying draws only after receiving the matching RepaintResponse.
    // If multiple RepaintRequests are in flight, the remote session runtime may
    // ignore all but the last one.
    uint64 repaint_request_seq = 1;
    // Opaque scrollback cursor. Absent means assume the client has current
    // scrollback and send none. Present empty bytes means send all retained
    // scrollback available; present non-empty bytes must come from a previous
    // Draw.scrollback_cursor.
    optional bytes scrollback_cursor = 2;
    // Optional cap for retained scrollback rows included with an initial stream
    // open repaint. Absent means all available retained scrollback.
    optional uint32 initial_scrollback_rows = 3;
  }

  // Confirms the session selected for this connection.
  message SessionAttached {
    // Canonical session GUID in s-prefixed hyphenated UUID form.
    string session_guid = 1;
    // Absolute path to this session's GUID directory
    string session_dir = 3;
  }

  // Debug-only request that severs all attached client connections.
  message SessionClientDebugSeverConnectionRequest {}

  // Debug-only request that makes all attached client connections stop
  // responding for a bounded duration. Omitted or zero seconds asks the
  // receiver to use its default debug-unresponsive duration.
  message SessionClientDebugUnresponsiveConnectionRequest {
    uint32 seconds = 1;
  }

  // Confirms that a debug client-control request was accepted.
  message SessionClientControlResponse {}

  // Requests ssh-shaped hangup for the remote PTY session. This is sent by a
  // daemon when its local visible-client socket closes.
  message SessionHangupRequest {}

  // Tells an attached client that the session has ended.
  message SessionEnded {
    enum Reason {
      REASON_UNSPECIFIED = 0;
      REASON_PROCESS_EXITED = 1;
      REASON_KILLED_BY_REQUEST = 2;
      REASON_DAEMON_SHUTDOWN = 3;
      REASON_REAPED = 4;
    }

    message ExitStatus {
      enum Kind {
        KIND_UNSPECIFIED = 0;
        KIND_EXITED = 1;
        KIND_SIGNALLED = 2;
      }

      Kind kind = 1;
      // Process exit status when kind is EXITED, or signal number when kind is
      // SIGNALLED.
      sint32 status = 2;
    }

    Reason reason = 1;
    // Absent means the remote session runtime did not observe a wait status,
    // for example because it is shutting down and synthesized the end
    // notification.
    optional ExitStatus exit_status = 2;
    optional uint64 ended_at_unix_ms = 3;
  }

  // Session-runtime-generated terminal bytes for the attached session.
  message Draw {
    // Opaque cursor representing the client scrollback state after applying
    // this draw. Clients must store and pass this back without interpreting it.
    bytes scrollback_cursor = 1;
    // Rows between the outer terminal viewport top and the sessh viewport top
    // after applying this draw. Omitted means the viewports are aligned.
    optional sint32 viewport_offset = 2;
    // Self-contained terminal bytes to write to the outer terminal in protocol
    // order. A Draw must apply and clean up any temporary terminal state it
    // uses.
    bytes draw_bytes = 3;
    // Terminal bytes the client keeps in memory until it really leaves the
    // session view. Transport loss starts reconnect, so the client keeps this
    // payload active; client close or session-end writes it. Present empty
    // clears a previous restore.
    optional bytes attached_client_end_restore_bytes = 4;
    // Present when this draw includes the current screen title state. True means
    // the remote app has set a terminal title, even if that title is the empty
    // string. False means no app title is known. The client needs this bit so a
    // temporary local title such as reconnect status can be restored correctly:
    // use the app title when present, otherwise use a client-local fallback. Do
    // not send that fallback to the remote session runtime. It may contain the
    // user's local ssh alias or other client-private naming for the remote host,
    // which ssh does not normally reveal to the remote side.
    optional bool app_title_present = 5;
  }

  // Response for a RepaintRequest. The embedded Draw is applied exactly like a
  // framed Draw.
  message RepaintResponse {
    uint64 repaint_request_seq = 1;
    Draw draw = 2;
  }

  // Raw inner PTY bytes captured for a client-requested tty transcript.
  message TtyTranscriptChunk {
    enum Stream {
      STREAM_UNSPECIFIED = 0;
      STREAM_INNER_IN = 1;
      STREAM_INNER_OUT = 2;
    }

    Stream stream = 1;
    bytes data = 2;
  }

  oneof payload {
    Open open = 1;
    Input input = 2;
    InputAck input_ack = 3;
    Resize resize = 4;
    RepaintRequest repaint_request = 5;
    SessionAttached session_attached = 6;
    SessionEnded session_ended = 7;
    Draw draw = 8;
    RepaintResponse repaint_response = 9;
    TtyTranscriptChunk tty_transcript_chunk = 10;
    SessionClientControlResponse session_client_control_response = 12;
    SessionClientDebugSeverConnectionRequest debug_sever_connection_request = 13;
    SessionClientDebugUnresponsiveConnectionRequest debug_unresponsive_connection_request = 14;
    SessionHangupRequest session_hangup_request = 15;
  }
}

// Ordered proxy stream item. Data is offset-free here; mux offsets live in
// MuxStreamFrame.Payload, and direct local IPC relies on socket ordering.
message ProxyStreamItem {
  // Proxy stream open details. When muxed, this is sent as the first typed
  // proxy payload after MuxStreamFrame.Open and does not consume proxy byte
  // offset space; data may still start at offset 0.
  message Open {
    string proxy_guid = 1;
    string proxy_host = 2;
    uint32 proxy_port = 3;
  }

  oneof payload {
    Open open = 1;
    bytes data = 2;
  }
}
