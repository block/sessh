syntax = "proto3";

package sessh.handshake.v1;

// Stable sessh remote handshake payloads.
//
// These messages are carried by the length-prefixed HelloFrame below. They are
// deliberately kept outside the versioned remote protocol schema: a peer must
// be able to parse these messages before it knows whether it understands the
// remote protocol version.
//
// Compatibility rule: evolve these messages append-only. Existing field
// numbers, enum values, and meanings must remain stable.

message HelloFrame {
  oneof payload {
    HelloRequest hello_request = 1;
    HelloOk hello_ok = 2;
    HelloError hello_error = 3;
  }

  // Field numbers 10+ belong to the post-handshake Frame schema.
  reserved 10 to max;
}

message HelloRequest {
  // Maximum remote protocol version this peer can speak.
  uint32 protocol_major = 1;
  uint32 protocol_minor = 2;
  // Human-readable binary version for diagnostics and display only.
  string version = 3;
}

message HelloOk {
}

message HelloError {
  string code = 1;
  string message = 2;
  optional string hint = 3;
}

// Stable generic error payload.
//
// Used by the post-handshake Frame after the handshake. Existing fields and
// meanings must remain stable.
message Error {
  string code = 1;
  string message = 2;
  optional string hint = 3;
}
